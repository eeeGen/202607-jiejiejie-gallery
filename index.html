<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>姐姐姐姐 · 2026.07</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <p class="eyebrow">PHOTO ARCHIVE · JULY 2026</p>
      <h1>姐姐姐姐</h1>
      <p class="intro">三组影像，慢慢品尝姐姐。</p>
      <div class="topbar">
        <nav class="filters" aria-label="照片分组">
          <button class="active" data-set="all">全部</button
          ><button data-set="set-1">第一组</button
          ><button data-set="set-2">第二组</button
          ><button data-set="set-3">第三组</button>
        </nav>
        <div class="download-bar"><span id="selected-count">已选 0 张</span><button id="download-selected" disabled>下载所选</button><button id="download-all">下载全部</button></div>
      </div>
    </header>
    <main>
      <section id="gallery" class="gallery" aria-live="polite"></section>
    </main>
    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" hidden>
      <button class="close" aria-label="关闭">×</button
      ><button class="prev" aria-label="上一张">‹</button>
      <figure>
        <img id="lightbox-image" alt="" />
        <figcaption id="caption"></figcaption>
        <a id="lightbox-download" class="lightbox-download" href="#" target="_blank" rel="noopener">下载原图</a>
      </figure>
      <button class="next" aria-label="下一张">›</button>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="gallery.js"></script>
  </body>
</html>
